name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_mysql, mbstring, xml, ctype, iconv

      - name: Install Composer dependencies (prod)
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Build Tailwind CSS (minified)
        run: php bin/console tailwind:build --minify
        env:
          APP_ENV: prod
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_URL: "mysql://ci:ci@127.0.0.1:3306/ci?serverVersion=8.0"

      - name: Install importmap vendor assets
        run: php bin/console importmap:install
        env:
          APP_ENV: prod
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_URL: "mysql://ci:ci@127.0.0.1:3306/ci?serverVersion=8.0"

      - name: Compile AssetMapper assets
        run: php bin/console asset-map:compile
        env:
          APP_ENV: prod
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_URL: "mysql://ci:ci@127.0.0.1:3306/ci?serverVersion=8.0"

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude-from='.rsync-exclude'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Post-deploy: cache clear & migrations"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            php83 bin/console cache:clear --env=prod
            php83 bin/console doctrine:migrations:migrate --no-interaction --env=prod
